<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Banana Factory - Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background"></div>
  <div class="banana banana1">🍌</div>
  <div class="banana banana2">🍌</div>
  <div class="banana banana3">🍌</div>

  <div class="card auth-card">
    <div class="top-row">
      <h1>🍌 Banana Factory</h1>
      <button id="darkToggle" class="icon-btn" title="Dark mode">🌙</button>
    </div>

    <p class="sub">Clock in and start quality checks.</p>

    <form id="loginForm">
      <input id="username" type="text" placeholder="Username" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit" class="primary">Enter Factory</button>
    </form>

    <div class="links">
      <a href="create.html">Create account</a>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
